services:
  db:
    image: postgres:16
    container_name: content_moderation_db
    environment:
      POSTGRES_DB: content_moderation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: content_moderation_redis
    ports:
      - "6380:6379"

  app:
    build: .
    container_name: content_moderation_app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/content_moderation
      SECRET_KEY: docker-dev-secret-key
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PORT: 8000
    ports:
      - "8000:8000"
    command: uvicorn app:app --host 0.0.0.0 --port 8000

  worker:
    build: .
    container_name: content_moderation_worker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/content_moderation
      SECRET_KEY: docker-dev-secret-key
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PORT: 8000
    command: celery -A celery_app worker --loglevel=info

  flower:
    build: .
    container_name: content_moderation_flower
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379
    ports:
      - "5555:5555"
    command: celery -A celery_app flower --port=5555

volumes:
  postgres_data: